<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Centripetal Force GOD MODE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  background: radial-gradient(circle at center, #020617, #000);
  overflow-x: hidden;
}

/* BACKGROUND ANIMASI */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-radial-gradient(circle, #38bdf8 0px, transparent 2px);
  opacity: 0.05;
  animation: rotateBg 30s linear infinite;
}

@keyframes rotateBg {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* HERO */
h1 {
  color: #38bdf8;
  text-shadow: 0 0 20px #38bdf8;
}

.hero {
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.quote { color: #22c55e; }
.desc { font-size: 14px; opacity: 0.8; }

/* GAUGE BAR */
.gauge {
  width: 80%;
  height: 20px;
  margin: 15px auto;
  background: #111;
  border-radius: 20px;
  overflow: hidden;
}

.gauge-fill {
  height: 100%;
  width: 0%;
  background: lime;
  transition: 0.3s;
}

/* ANIMASI LINGKARAN */
.circle {
  width: 100px;
  height: 100px;
  border: 3px solid #38bdf8;
  border-radius: 50%;
  margin: 15px auto;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg);}
}

/* CARD */
.container {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
}

.big {
  font-size: 22px;
  color: #22c55e;
}

/* BUTTON */
button {
  width: 45%;
  margin: 5px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.start { background: #22c55e; }
.stop { background: #ef4444; }
.reset { background: #f59e0b; }

canvas {
  width: 100% !important;
  height: 250px !important;
}

</style>
</head>

<body>

<h1>⚡ Gaya Sentripetal IoT</h1>

<div class="hero">
<p class="quote">"Where rotation meets force, physics comes alive"</p>
<p class="desc">Monitoring gaya sentripetal real-time berbasis IoT</p>
</div>

<div class="circle" id="circle"></div>

<div class="gauge">
  <div class="gauge-fill" id="gauge"></div>
</div>

<h3 id="status">Status: Normal</h3>

<div class="container">
  <div class="card"><h3>Force</h3><div id="force" class="big">0</div></div>
  <div class="card"><h3>Max</h3><div id="max" class="big">0</div></div>
  <div class="card"><h3>Min</h3><div id="min" class="big">0</div></div>
  <div class="card"><h3>Avg</h3><div id="avg" class="big">0</div></div>
</div>

<canvas id="chart"></canvas>

<div>
<button class="start" onclick="running=true">START</button>
<button class="stop" onclick="running=false">STOP</button>
<button class="reset" onclick="resetData()">RESET</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  databaseURL: "https://centripetal-force-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data=[],labels=[];
let maxVal=-Infinity,minVal=Infinity,sum=0,count=0;
let running=true;

function beep(freq){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.1);
}

const chart=new Chart(document.getElementById('chart'),{
type:'line',
data:{labels:labels,datasets:[{data:data,borderColor:'lime'}]}
});

db.ref("sensor/force").on("value",(snap)=>{
let v=snap.val();
if(v && running){
v=parseFloat(v);

document.getElementById("force").innerHTML=v.toFixed(2);

// gauge
let percent=Math.min((v/5)*100,100);
document.getElementById("gauge").style.width=percent+"%";

// circle speed
document.getElementById("circle").style.animationDuration=(2/(v+0.5))+"s";

// status
let status="Normal";
if(v<1){status="Lambat"; beep(300);}
else if(v<2){status="Stabil"; beep(600);}
else {status="Cepat ⚡"; beep(900);}
document.getElementById("status").innerHTML="Status: "+status;

// stats
if(v>maxVal) maxVal=v;
if(v<minVal) minVal=v;
sum+=v; count++;

document.getElementById("max").innerHTML=maxVal.toFixed(2);
document.getElementById("min").innerHTML=minVal.toFixed(2);
document.getElementById("avg").innerHTML=(sum/count).toFixed(2);

// chart
if(data.length>15){data.shift();labels.shift();}
data.push(v); labels.push("");
chart.update();
}
});

function resetData(){
data=[];labels=[];
maxVal=-Infinity;minVal=Infinity;sum=0;count=0;
chart.data.datasets[0].data=[];
chart.update();
}

</script>

</body>
</html>
