<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 CENTRIPETAL SMART LAB • ULTRA MODE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#020617,#000);
color:white;
padding-bottom:110px;
}

/* PAGE */
.page{
display:none;
padding:16px;
min-height:100vh;
opacity:0;
transform:translateY(20px);
transition:0.4s;
}
.page.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:18px;
margin:12px 0;
border-radius:18px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
transition:0.3s;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px #38bdf8;
}

/* NAV */
#nav{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:95%;
height:70px;
display:flex;
background:rgba(15,23,42,0.8);
backdrop-filter:blur(10px);
border-radius:20px;
z-index:999999;
}

#nav button{
flex:1;
border:none;
background:none;
color:#94a3b8;
font-size:11px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#nav button.active{
color:#38bdf8;
transform:scale(1.1);
text-shadow:0 0 10px #38bdf8;
}

.icon{font-size:20px}

/* SPIN */
#spin{
width:80px;
height:80px;
border-radius:50%;
border:5px solid #38bdf8;
margin:auto;
animation:spin 2s linear infinite;
}
@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2>🚀 CENTRIPETAL LAB</h2>
<p>Smart Physics System + Firebase</p>
</div>

<div class="card">
<p id="statusHome">🟡 Connecting...</p>
<p id="homeData">-</p>
<p id="homeResult">-</p>
</div>

<div class="card">
<h3>🌀 SIMULASI</h3>
<div id="spin"></div>
</div>
</div>

<!-- MATERI -->
<div id="materi" class="page">
<div class="card">

<h2>📘 GAYA SENTRIPETAL (FULL AKADEMIK)</h2>

<p>F = mv² / r</p>
<p>v = ωr</p>
<p>F = mω²r</p>

<p style="color:#38bdf8"><b>F ∝ ω²</b></p>

</div>
</div>

<!-- EKSPERIMEN -->
<div id="eksperimen" class="page">

<div class="card">
<h2>🧪 EKSPERIMEN GAYA SENTRIPETAL</h2>

<p>Grafik realtime + regresi otomatis</p>

<canvas id="chart"></canvas>

<p id="eq"></p>
<p id="r2"></p>
<p id="interp"></p>

</div>

</div>

<!-- ARSIP -->
<div id="arsip" class="page">
<div class="card">
<h2>📂 DATA</h2>
<table border="1" width="100%">
<tbody id="tb"></tbody>
</table>
</div>
</div>

<!-- AI -->
<div id="ai" class="page">
<div class="card">
<input id="q" placeholder="Tanya...">
<button onclick="ask()">TANYA</button>
<p id="a"></p>
</div>
</div>

<!-- CREATOR -->
<div id="creator" class="page">
<div class="card">
<h2>👤 INFO</h2>
<p>SMA NEGERI 1 GEGESIK</p>
</div>
</div>

<!-- NAV -->
<div id="nav">
<button onclick="go('home',this)" class="active"><div class="icon">🏠</div></button>
<button onclick="go('materi',this)"><div class="icon">📘</div></button>
<button onclick="go('eksperimen',this)"><div class="icon">🧪</div></button>
<button onclick="go('arsip',this)"><div class="icon">📂</div></button>
<button onclick="go('ai',this)"><div class="icon">🤖</div></button>
<button onclick="go('creator',this)"><div class="icon">👤</div></button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig={
apiKey:"ISI_API_KEY",
databaseURL:"ISI_DATABASE_URL"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

/* NAV */
window.go=(id,el)=>{
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll("#nav button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* DATA */
let Fdata=[],Wdata=[];

/* CHART */
const chart=new Chart(document.getElementById("chart"),{
type:"scatter",
data:{
datasets:[
{label:"F vs ω²",data:[]},
{label:"Trend",data:[],type:"line",borderColor:"#38bdf8",tension:0.4}
]
}
});

/* REGRESI */
function reg(x,y){
let n=x.length,sx=0,sy=0,sxy=0,sx2=0;
for(let i=0;i<n;i++){
sx+=x[i];sy+=y[i];
sxy+=x[i]*y[i];
sx2+=x[i]*x[i];
}
let m=(n*sxy-sx*sy)/(n*sx2-sx*sx);
let b=(sy-m*sx)/n;
return {m,b};
}

/* FIREBASE */
onValue(ref(db,"sensor"),snap=>{

let d=snap.val()||{};
let rpm=d.rpm||0;
let F=d.force||0;

let omega=(rpm*2*Math.PI)/60;
let w2=omega*omega;

/* store */
Fdata.push(F);
Wdata.push(w2);

/* UI */
statusHome.innerText="🟢 Connected";
homeData.innerText=`RPM=${rpm}`;

/* chart */
chart.data.datasets[0].data.push({x:w2,y:F});
if(chart.data.datasets[0].data.length>50){
chart.data.datasets[0].data.shift();
}

/* arsip */
tb.innerHTML+=`
<tr>
<td>${Fdata.length}</td>
<td>${rpm}</td>
<td>${w2.toFixed(2)}</td>
<td>${F.toFixed(2)}</td>
</tr>`;

/* regresi */
if(Fdata.length>3){
let r=reg(Wdata,Fdata);
eq.innerText=`F = ${r.m.toFixed(2)}ω² + ${r.b.toFixed(2)}`;
}

/* update */
chart.update('active');

});

/* AI */
window.ask=()=>{
a.innerText="F = mω²r";
}

</script>

</body>
</html>
