<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Gaya Sentripetal IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
.bar{width:250px;height:10px;background:#111;border-radius:10px;}
.fill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#38bdf8);}

/* NEBULA */
.nebula{
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
z-index:-4;
background:
radial-gradient(circle at 30% 40%, rgba(56,189,248,0.2), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(139,92,246,0.2), transparent 40%),
radial-gradient(circle at 50% 50%, rgba(34,197,94,0.15), transparent 50%);
animation:nebulaMove 40s linear infinite;
filter:blur(60px);
}
@keyframes nebulaMove{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* STAR */
#stars{position:fixed;width:100%;height:100%;z-index:-3;}

/* GRID */
.grid{
position:fixed;
bottom:0;
width:100%;
height:50%;
z-index:-2;
background-image:
linear-gradient(#38bdf8 1px,transparent 1px),
linear-gradient(90deg,#38bdf8 1px,transparent 1px);
background-size:40px 40px;
transform:perspective(400px) rotateX(60deg);
opacity:0.3;
}

/* HEADER */
h1{color:#38bdf8;text-shadow:0 0 20px #38bdf8;}
.team{font-size:13px;}

.quote{
color:#22c55e;
font-style:italic;
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 5px #22c55e}
to{text-shadow:0 0 20px #22c55e}
}

/* PANEL */
.panel{
background:rgba(255,255,255,0.05);
margin:10px;
padding:10px;
border-radius:10px;
}

/* BUTTON */
button{
width:30%;
padding:10px;
margin:5px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}
.start{background:#22c55e;}
.stop{background:#ef4444;}
.reset{background:#f59e0b;}

/* ORBIT */
.orbit{
width:150px;height:150px;
margin:20px auto;
border:2px solid #38bdf8;
border-radius:50%;
position:relative;
}
.dot{
width:10px;height:10px;
background:lime;
border-radius:50%;
position:absolute;
top:50%;left:50%;
transform-origin:-65px center;
}
.arrow{
position:absolute;
height:2px;
background:red;
top:50%;
left:-30px;
}

/* DATA */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
}
.big{color:#22c55e;}

canvas{width:100%!important;height:250px!important;}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div>
<h2>🚀 INITIALIZING SYSTEM</h2>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>
</div>

<div class="nebula"></div>
<canvas id="stars"></canvas>
<div class="grid"></div>

<h1>🚀 GAYA SENTRIPETAL IOT</h1>

<div class="team">
Kelompok 6: MOHAMMAD RIZKY AL HIDAYAH, RAFKA ADE WIRAYUDA, SHESYA ANINDITA, MOHAMMAD RIZQI AHMAD, ADE ZULFADLI
</div>

<p class="quote">"Where rotation meets force, physics comes alive"</p>

<div class="panel">
<button class="start" onclick="startData()">START</button>
<button class="stop" onclick="stopData()">STOP</button>
<button class="reset" onclick="resetData()">RESET</button>
</div>

<div class="orbit">
<div class="dot" id="dot">
<div class="arrow"></div>
</div>
</div>

<h3 id="status">Status: Normal</h3>

<div class="container">
<div class="card"><h3>Force</h3><div id="force" class="big">0</div></div>
<div class="card"><h3>Max</h3><div id="max" class="big">0</div></div>
<div class="card"><h3>Min</h3><div id="min" class="big">0</div></div>
<div class="card"><h3>Avg</h3><div id="avg" class="big">0</div></div>
</div>

<div class="container">
<div class="card"><h3>Omega</h3><div id="omega"></div></div>
<div class="card"><h3>Acceleration</h3><div id="acc"></div></div>
</div>

<canvas id="chart"></canvas>

<script>

/* LOADER */
let p=0;
let load=setInterval(()=>{
p+=10;
document.getElementById("fill").style.width=p+"%";
if(p>=100){
clearInterval(load);
document.getElementById("loader").style.display="none";
}
},200);

/* FIREBASE (FIXED) */
const firebaseConfig = {
  apiKey: "AIzaSyAQb7sQunsPqRBdd_KaxGRjtS0JpB7gTNI",
  authDomain: "centripetal-force.firebaseapp.com",
  databaseURL: "https://centripetal-force-default-rtdb.firebaseio.com/",
  projectId: "centripetal-force",
  storageBucket: "centripetal-force.firebasestorage.app",
  messagingSenderId: "807201222154",
  appId: "1:807201222154:web:90520e713ddceeda33b9f3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* DATA */
let data=[],labels=[];
let maxVal=-Infinity,minVal=Infinity,sum=0,count=0;
let running=true,angle=0;

/* CHART FIX */
const chart = new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:labels,
    datasets:[{
      data:data,
      borderColor:"lime"
    }]
  }
});

/* STAR */
const c=document.getElementById("stars");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*c.width,y:Math.random()*c.height,size:Math.random()*2,speed:Math.random()});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
stars.forEach(s=>{
ctx.fillStyle="white";
ctx.globalAlpha=Math.random();
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();
s.y+=s.speed;
if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}
});
requestAnimationFrame(draw);
}
draw();

/* SENSOR FIX */
db.ref("sensor/force").on("value",snap=>{
let v=snap.val();

if(v !== null && running){

v=parseFloat(v);
document.getElementById("force").innerHTML=v.toFixed(2);

/* ORBIT */
angle+=1+v*2;
document.getElementById("dot").style.transform=
`rotate(${angle}deg) translateX(65px)`;
document.querySelector(".arrow").style.width=(20+v*15)+"px";

/* STATUS */
let s="Normal";
if(v<1)s="Lambat 🐢";
else if(v<2)s="Stabil ⚖️";
else s="Cepat ⚡";
document.getElementById("status").innerHTML="Status: "+s;

/* STATS */
if(v>maxVal)maxVal=v;
if(v<minVal)minVal=v;
sum+=v;count++;

document.getElementById("max").innerHTML=maxVal.toFixed(2);
document.getElementById("min").innerHTML=minVal.toFixed(2);
document.getElementById("avg").innerHTML=(sum/count).toFixed(2);

/* PHYSICS */
let r=0.5;
document.getElementById("omega").innerHTML=(v/r).toFixed(2);
document.getElementById("acc").innerHTML=(v*v/r).toFixed(2);

/* CHART */
if(data.length>20){data.shift();labels.shift();}
data.push(v);labels.push("");
chart.update();
}
});

/* CONTROL */
function startData(){running=true;}
function stopData(){running=false;}
function resetData(){
data=[];labels=[];
maxVal=-Infinity;minVal=Infinity;sum=0;count=0;
chart.data.datasets[0].data=[];
chart.update();
}

</script>

</body>
</html>
